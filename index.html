<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מזל טוב דפנה!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        .animated-bg { 
            background: linear-gradient(-45deg, #FFD1DC, #E6E6FA, #B3E5FC, #F3E5F5); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
        }
        .animate-reveal { 
            animation: fadeInSlide 0.8s ease-out forwards; 
            opacity: 0; 
        }
        @keyframes fadeInSlide { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const IconSparkles = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="m5 3 1 1"/><path d="m19 19 1 1"/><path d="m5 21 1-1"/><path d="m19 3 1-1"/></svg>
        );
        const IconHeart = ({ fill = "none" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );
        const IconRefresh = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        );
        const IconQuote = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21c3 0 7-1 7-8V5H3v8h5c0 2-2 3-5 4v4zm11 0c3 0 7-1 7-8V5h-7v8h5c0 2-2 3-5 4v4z"/></svg>
        );
        const IconUser = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        );

        const App = () => {
            const [screen, setScreen] = useState('intro');
            const INITIAL_DECK = [1, 2, 3, 4, 5, 6, 7, 8, 9];
            const [deck, setDeck] = useState(INITIAL_DECK);
            const [currentCard, setCurrentCard] = useState(0); 
            const [isAnimating, setIsAnimating] = useState(false);
            const [dafnaImageError, setDafnaImageError] = useState(false);
            const [card0Error, setCard0Error] = useState(false);

            const drawCard = () => {
                if (deck.length === 0 || isAnimating) return;
                setIsAnimating(true);
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * deck.length);
                    const selectedCard = deck[randomIndex];
                    setCurrentCard(selectedCard);
                    setDeck(deck.filter((_, i) => i !== randomIndex));
                    setTimeout(() => setIsAnimating(false), 400); 
                }, 400); 
            };

            const resetGame = () => {
                setDeck(INITIAL_DECK);
                setCurrentCard(0);
                setScreen('intro');
                setIsAnimating(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 font-sans text-slate-700 relative overflow-hidden" dir="rtl">
                    <div className="animated-bg absolute inset-0 -z-10"></div>

                    <div className="max-w-md w-full bg-white/95 backdrop-blur-xl rounded-[3rem] shadow-2xl border border-white/60 overflow-hidden min-h-[650px] flex flex-col relative">
                        
                        {screen === 'intro' && (
                            <div className="p-8 flex-1 flex flex-col items-center justify-center text-center animate-reveal">
                                <div className="relative mb-8">
                                    <div className="w-40 h-40 rounded-full border-4 border-white shadow-xl overflow-hidden bg-white">
                                        {!dafnaImageError ? (
                                            <img src="dafna.png" alt="דפנה" className="w-full h-full object-cover" onError={() => setDafnaImageError(true)} />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-[#B39DDB]"><IconUser /></div>
                                        )}
                                    </div>
                                    <div className="absolute -bottom-2 -right-2 bg-[#FFD1DC] rounded-full p-2 text-[#D81B60] border-2 border-white shadow-lg">
                                        <IconHeart fill="currentColor" />
                                    </div>
                                </div>
                                <h1 className="text-4xl font-black mb-4 bg-gradient-to-r from-[#4A148C] to-[#D81B60] bg-clip-text text-transparent">מזל טוב דפנה!</h1>
                                <div className="space-y-4 text-lg text-slate-600 px-2">
                                    <p className="font-bold text-[#7B1FA2] text-xl">דפנה יקרה,</p>
                                    <p>לרגל יום הולדתך, בחרנו להעניק לך שי צנוע של הערכה:</p>
                                    <div className="bg-[#F3E5F5]/60 p-5 rounded-2xl italic border border-[#D1C4E9] text-[#6A1B9A]">כל מפקחת ומפקח שיתפו בתכונה ייחודית אחת המאפיינת אותך בעיניהם.</div>
                                </div>
                                <button onClick={() => setScreen('game')} className="mt-10 w-full py-5 rounded-2xl font-bold text-xl bg-gradient-to-r from-[#FFD1DC] to-[#ffb7c5] text-[#880E4F] shadow-lg border-b-4 border-[#F06292] active:scale-95 transition-all flex items-center justify-center gap-3">
                                    <span>הצג דברי מפקחים</span> <IconSparkles />
                                </button>
                            </div>
                        )}

                        {screen === 'game' && (
                            <div className="flex-1 flex flex-col animate-reveal">
                                <div className="pt-6 px-8 text-center">
                                    <h2 className="text-2xl font-bold bg-gradient-to-r from-[#4A148C] to-[#D81B60] bg-clip-text text-transparent">מזל טוב דפנה!</h2>
                                    <div className="inline-block mt-2 px-4 py-1 bg-[#F3E5F5] rounded-full text-xs font-bold text-[#7B1FA2]">נותרו {deck.length} קלפים</div>
                                </div>

                                {/* המכל המשופר - גמיש ומתאים את עצמו לתמונה */}
                                <div className="p-6 flex-1 flex justify-center items-center">
                                    <div className={`relative max-w-xs w-full bg-white rounded-2xl shadow-2xl overflow-hidden transition-all duration-500 transform
                                        ${isAnimating ? 'opacity-0 scale-95' : 'opacity-100 scale-100'}`}>
                                        <img 
                                            src={`card${currentCard}.png`} 
                                            alt="Card Content"
                                            className="w-full h-auto max-h-[70vh] object-contain block"
                                            onError={(e) => {
                                                e.target.onerror = null;
                                                e.target.src = `https://via.placeholder.com/400x600/F3E5F5/9575CD?text=קלף+${currentCard}`;
                                            }}
                                        />
                                    </div>
                                </div>

                                <div className="px-8 pb-8 flex flex-col gap-3">
                                    {(deck.length > 0 || isAnimating) ? (
                                        <button onClick={drawCard} disabled={isAnimating} className="w-full py-5 rounded-2xl font-bold text-xl bg-[#FFD1DC] text-[#880E4F] border-b-4 border-[#F06292] shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                            <IconSparkles /> <span>החליפי קלף</span>
                                        </button>
                                    ) : (
                                        <button onClick={() => setScreen('end')} className="w-full py-5 rounded-2xl font-black text-2xl bg-[#B3E5FC] text-[#01579B] shadow-xl animate-bounce border-b-4 border-[#4FC3F7] flex items-center justify-center gap-3">
                                            <span>לברכה המלאה</span> <IconHeart fill="currentColor" />
                                        </button>
                                    )}
                                    <button onClick={resetGame} className="py-2 text-slate-400 text-xs flex items-center justify-center gap-2 opacity-70 hover:opacity-100 transition-opacity">
                                        <IconRefresh /> התחל מהתחלה
                                    </button>
                                </div>
                            </div>
                        )}

                        {screen === 'end' && (
                            <div className="p-8 flex-1 flex flex-col items-center justify-center animate-reveal text-center">
                                <div className="mb-6 relative">
                                    <div className="w-48 bg-white rounded-2xl shadow-2xl border-4 border-white overflow-hidden transform -rotate-3 transition-transform hover:rotate-0 duration-500">
                                        {!card0Error ? (
                                            <img src="card0.png" alt="סיום" className="w-full h-auto object-contain" onError={() => setCard0Error(true)} />
                                        ) : (
                                            <div className="p-10 bg-purple-50 text-[#7B1FA2] font-black">מזל טוב!</div>
                                        )}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <h3 className="text-3xl font-black text-[#4A148C]">דפנה יקרה,</h3>
                                    <div className="text-slate-700 leading-relaxed space-y-2">
                                        <p>אנו מאחלים לך בריאות איתנה ושמחה בלב,</p>
                                        <p>שתמשיכי להיות מוקפת באהבה,</p>
                                        <p>ולהרחיב מעגלי השפעה של טוב והשראה.</p>
                                        <p className="font-bold text-[#D81B60] text-lg pt-4">באהבה גדולה,<br/>מפקחי היסודי</p>
                                    </div>
                                </div>
                                <button onClick={resetGame} className="mt-10 text-[#9575CD] hover:text-[#6A1B9A] font-bold flex items-center gap-2 text-xs">
                                    <IconRefresh /> חזרה להתחלה
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
