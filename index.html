<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מזל טוב דפנה!</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        .animated-bg { 
            background: linear-gradient(-45deg, #FFD1DC, #E6E6FA, #B3E5FC, #F3E5F5); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
        }
        .animate-reveal { 
            animation: fadeInSlide 0.8s ease-out forwards; 
            opacity: 0; 
        }
        @keyframes fadeInSlide { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .custom-shadow {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.8s; }
        .delay-4 { animation-delay: 1.1s; }
        .delay-5 { animation-delay: 1.4s; }
        .delay-6 { animation-delay: 1.7s; }
        
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // רכיבי אייקונים פנימיים כדי למנוע בעיות טעינה משרתים חיצוניים
        const IconSparkles = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="m5 3 1 1"/><path d="m19 19 1 1"/><path d="m5 21 1-1"/><path d="m19 3 1-1"/></svg>
        );
        const IconHeart = ({ fill = "none" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );
        const IconRefresh = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        );
        const IconQuote = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21c3 0 7-1 7-8V5H3v8h5c0 2-2 3-5 4v4zm11 0c3 0 7-1 7-8V5h-7v8h5c0 2-2 3-5 4v4z"/></svg>
        );
        const IconUser = () => (
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        );

        const App = () => {
          const [screen, setScreen] = useState('intro');
          const INITIAL_DECK = [1, 2, 3, 4, 5, 6, 7, 8, 9];
          const [deck, setDeck] = useState(INITIAL_DECK);
          const [currentCard, setCurrentCard] = useState(0); // 0 = card0.png (גב הקלף)
          const [isAnimating, setIsAnimating] = useState(false);
          const [dafnaImageError, setDafnaImageError] = useState(false);
          const [card0Error, setCard0Error] = useState(false);

          const drawCard = () => {
            if (deck.length === 0 || isAnimating) return;
            setIsAnimating(true);
            
            // אנימציית החלקה
            setTimeout(() => {
              const randomIndex = Math.floor(Math.random() * deck.length);
              const selectedCard = deck[randomIndex];
              const newDeck = deck.filter((_, index) => index !== randomIndex);

              setCurrentCard(selectedCard);
              setDeck(newDeck);
              
              setTimeout(() => {
                setIsAnimating(false);
              }, 50);
            }, 400); 
          };

          const resetGame = () => {
            setDeck(INITIAL_DECK);
            setCurrentCard(0);
            setScreen('intro');
            setIsAnimating(false);
          };

          const CardContent = ({ cardNumber }) => {
            const isBack = cardNumber === 0;
            const fileName = `card${cardNumber}.png`;
            
            return (
              <img 
                src={fileName} 
                alt={isBack ? "גב הקלף" : `קלף ${cardNumber}`} 
                className="w-full h-full object-contain p-2" 
                onError={(e) => {
                    e.target.onerror = null;
                    e.target.src = `https://via.placeholder.com/300x450/F3E5F5/9575CD?text=קלף+${cardNumber}`;
                }} 
              />
            );
          };

          return (
            <div className="min-h-screen flex items-center justify-center p-4 font-sans text-slate-700 relative overflow-hidden" dir="rtl">
              <div className="animated-bg absolute inset-0 -z-10"></div>

              <div className="max-w-md w-full bg-white/95 backdrop-blur-xl rounded-[3.5rem] custom-shadow border border-white/60 overflow-hidden min-h-[680px] flex flex-col relative">
                
                {/* מסך פתיחה */}
                {screen === 'intro' && (
                  <div className="p-8 flex-1 flex flex-col items-center justify-center text-center animate-reveal">
                    <div className="relative mb-8">
                      <div className="w-36 h-36 rounded-full border-4 border-white shadow-xl overflow-hidden bg-white flex items-center justify-center">
                        {!dafnaImageError ? (
                            <img src="dafna.png" alt="דפנה" className="w-full h-full object-cover" onError={() => setDafnaImageError(true)} />
                        ) : (
                            <div className="text-[#B39DDB]"><IconUser /></div>
                        )}
                      </div>
                      <div className="absolute -bottom-2 -right-2 bg-[#FFD1DC] rounded-full p-2.5 shadow-lg border-2 border-white text-[#D81B60] flex items-center justify-center">
                        <IconHeart fill="currentColor" />
                      </div>
                    </div>

                    <h1 className="text-4xl font-black mb-4 bg-gradient-to-r from-[#4A148C] via-[#7B1FA2] to-[#D81B60] bg-clip-text text-transparent tracking-tight">מזל טוב דפנה!</h1>
                    
                    <div className="space-y-4 text-lg leading-relaxed text-slate-600 px-2 text-right">
                      <p className="font-bold text-[#7B1FA2] text-xl pr-4">דפנה יקרה,</p>
                      <p>לרגל יום הולדתך, בחרנו להעניק לך שי צנוע של הערכה:</p>
                      <div className="bg-[#F3E5F5]/60 p-5 rounded-[2rem] italic border border-[#D1C4E9] text-[#6A1B9A] text-center shadow-sm">כל מפקחת ומפקח שיתפו בתכונה ייחודית אחת המאפיינת אותך בעיניהם.</div>
                    </div>

                    <button 
                      onClick={() => setScreen('game')}
                      className="mt-10 w-full py-5 rounded-[2rem] font-bold text-xl bg-gradient-to-r from-[#FFD1DC] to-[#ffb7c5] text-[#880E4F] shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 border-b-4 border-[#F06292]"
                    >
                      <span>הצג דברי מפקחים</span>
                      <IconSparkles />
                    </button>
                  </div>
                )}

                {/* מסך המשחק */}
                {screen === 'game' && (
                  <div className="flex-1 flex flex-col animate-reveal">
                    <div className="pt-8 px-8 text-center">
                      <h2 className="text-2xl font-bold bg-gradient-to-r from-[#4A148C] to-[#D81B60] bg-clip-text text-transparent text-center">מזל טוב לדפנה שלנו</h2>
                      <div className="inline-flex items-center gap-2 mt-3 px-5 py-1.5 bg-[#F3E5F5] rounded-full text-sm font-bold text-[#7B1FA2] border border-[#D1C4E9]/50 shadow-sm mx-auto">
                        <span>נותרו {deck.length} קלפים</span>
                      </div>
                    </div>

                    <div className="p-8 flex-1 flex justify-center items-center overflow-hidden">
                      <div 
                        className={`w-56 h-80 bg-white rounded-[2.5rem] shadow-2xl border-[12px] border-white ring-2 ring-[#D1C4E9]/30 flex items-center justify-center transition-all duration-500 transform
                          ${isAnimating ? 'opacity-0 -translate-y-16 scale-90 blur-sm' : 'opacity-100 translate-y-0 scale-100 blur-0'}
                        `}
                      >
                        <CardContent cardNumber={currentCard} />
                      </div>
                    </div>

                    <div className="px-8 pb-10 flex flex-col gap-4 items-center">
                      {deck.length > 0 ? (
                        <button
                          onClick={drawCard}
                          disabled={isAnimating}
                          className="w-full py-5 rounded-2xl font-bold text-xl bg-[#FFD1DC] text-[#880E4F] hover:bg-[#ffb7c5] shadow-xl active:scale-90 transition-all flex items-center justify-center gap-2 border-b-4 border-[#F06292]"
                        >
                          <IconSparkles />
                          <span>הגרילי קלף</span>
                        </button>
                      ) : (
                        <button
                          onClick={() => setScreen('end')}
                          className="w-full py-6 rounded-2xl font-black text-2xl bg-[#B3E5FC] text-[#01579B] hover:bg-[#81D4FA] shadow-xl animate-bounce flex items-center justify-center gap-3 border-b-4 border-[#4FC3F7]"
                        >
                          <span>למעבר לברכה המלאה</span>
                          <IconHeart fill="currentColor" />
                        </button>
                      )}
                      
                      <div className="mt-2 text-[11px] font-bold text-[#9575CD]/60 tracking-widest uppercase text-center">אפריל 2026</div>
                      <button onClick={resetGame} className="w-full py-2 font-bold text-slate-400 text-xs flex items-center justify-center gap-2 opacity-70 hover:opacity-100 transition-opacity">
                        <IconRefresh />
                        התחל מהתחלה
                      </button>
                    </div>
                  </div>
                )}

                {/* מסך ברכה סופי */}
                {screen === 'end' && (
                  <div className="p-6 flex-1 flex flex-col items-center justify-center animate-reveal text-center relative overflow-hidden">
                    <div className="absolute top-10 left-10 text-[#FFD1DC] opacity-30 animate-pulse"><IconHeart fill="currentColor" /></div>
                    
                    <div className="mb-6 flex justify-center items-center gap-4">
                      <div className="w-14 h-14 bg-gradient-to-br from-[#B3E5FC] to-[#81D4FA] rounded-2xl rotate-12 flex items-center justify-center shadow-lg animate-reveal delay-1">
                        <div className="text-white -rotate-12"><IconQuote /></div>
                      </div>
                      <div className="relative w-28 h-36 bg-white rounded-2xl shadow-2xl border-[6px] border-white overflow-hidden flex items-center justify-center transform -rotate-12 -translate-x-4 hover:rotate-0 transition-transform duration-700 animate-reveal delay-3 ring-1 ring-purple-100">
                        {!card0Error ? (
                          <img src="card0.png" alt="דפנה עם עוגה" className="w-full h-full object-cover" onError={() => setCard0Error(true)} />
                        ) : (
                          <div className="w-full h-full bg-gradient-to-br from-[#F3E5F5] to-[#E1BEE7] flex flex-col items-center justify-center p-2 text-center text-pretty">
                            <span className="text-[10px] font-black text-[#7B1FA2] leading-tight">מזל טוב דפנה!</span>
                          </div>
                        )}
                      </div>
                    </div>
                    
                    <div className="bg-white/50 p-6 rounded-[3rem] border border-white/80 shadow-inner space-y-5 relative overflow-hidden">
                      <h3 className="text-3xl font-black mb-6 animate-reveal delay-2 relative inline-block bg-gradient-to-r from-[#4A148C] to-[#D81B60] bg-clip-text text-transparent">
                        דפנה יקרה,
                        <div className="absolute -bottom-1.5 left-0 right-0 h-1 bg-[#FFD1DC] rounded-full" />
                      </h3>

                      <div className="space-y-3 text-slate-800 text-base md:text-lg leading-relaxed font-medium">
                        <p className="animate-reveal delay-3 text-[#4A148C]">אנו מאחלים לך בריאות איתנה, שמחה ושקט בלב,</p>
                        <p className="animate-reveal delay-4 text-[#7B1FA2]">שתמשיכי להיות מוקפת באהבת משפחתך,</p>
                        <p className="animate-reveal delay-5 text-[#880E4F]">ולהרחיב עוד ועוד מעגלי השפעה של טוב, השראה ואנרגיות מעצימות.</p>
                        <p className="font-bold text-lg pt-1 animate-reveal delay-6 bg-gradient-to-r from-[#7B1FA2] to-[#D81B60] bg-clip-text text-transparent text-center text-pretty">
                          שתמשיכי לגעת, להוביל, וליצור עולם טוב יותר – בדרכך הייחודית והמרגשת.
                        </p>
                      </div>
                      
                      <div className="pt-8 animate-reveal" style={{animationDelay: '1.8s'}}>
                        <div className="inline-block px-10 py-5 bg-gradient-to-r from-[#F3E5F5] to-[#E1BEE7] rounded-full shadow-lg border border-white transition-transform hover:scale-105 duration-300">
                          <p className="text-base font-bold text-[#D81B60] mb-0.5 text-center">באהבה גדולה,</p>
                          <p className="text-2xl md:text-3xl font-black bg-gradient-to-r from-[#4A148C] to-[#7B1FA2] bg-clip-text text-transparent tracking-tight text-center text-pretty">
                            מפקחי היסודי
                          </p>
                        </div>
                      </div>
                    </div>

                    <div className="mt-8 text-[11px] font-bold text-[#9575CD]/60 tracking-widest uppercase text-center">אפריל 2026</div>
                    <button onClick={resetGame} className="mt-6 text-[#9575CD] hover:text-[#6A1B9A] font-black uppercase tracking-tighter transition-all flex items-center justify-center gap-2 text-xs">
                      <IconRefresh />
                      חזרה להתחלה
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
