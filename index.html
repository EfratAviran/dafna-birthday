<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מזל טוב דפנה!</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Assistant', sans-serif; 
        }

        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        
        .animated-bg { 
            background: linear-gradient(-45deg, #FFD1DC, #E6E6FA, #B3E5FC, #F3E5F5); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
        }
        
        .animate-reveal { 
            animation: fadeInSlide 0.8s ease-out forwards; 
            opacity: 0; 
        }
        
        @keyframes fadeInSlide { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .custom-shadow {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.8s; }
        .delay-4 { animation-delay: 1.1s; }
        .delay-5 { animation-delay: 1.4s; }
        .delay-6 { animation-delay: 1.7s; }
        
        /* מבטיח שהתמונה תמלא את הקלף */
        .card-img-fit {
            width: 100%;
            height: 100%;
            object-fit: fill; /* משתמש ב-fill כדי למלא את כל שטח הקלף הלבן */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [screen, setScreen] = useState('intro');
          const INITIAL_DECK = [1, 2, 3, 4, 5, 6, 7, 8, 9];
          const [deck, setDeck] = useState(INITIAL_DECK);
          const [currentCard, setCurrentCard] = useState(0); 
          const [isAnimating, setIsAnimating] = useState(false);
          const [imageError, setImageError] = useState(false);
          const [dafnaImageError, setDafnaImageError] = useState(false);
          const [card0Error, setCard0Error] = useState(false);

          // אתחול אייקונים בכל שינוי מסך או מצב אנימציה
          useEffect(() => {
            if (window.lucide) {
              window.lucide.createIcons();
            }
          }, [screen, currentCard, isAnimating]);

          const drawCard = () => {
            if (deck.length === 0 || isAnimating) return;
            setIsAnimating(true);
            
            setTimeout(() => {
              const randomIndex = Math.floor(Math.random() * deck.length);
              const selectedCard = deck[randomIndex];
              const newDeck = deck.filter((_, index) => index !== randomIndex);

              setCurrentCard(selectedCard);
              setDeck(newDeck);
              setImageError(false);
              
              setTimeout(() => {
                setIsAnimating(false);
              }, 50);
            }, 400); 
          };

          const resetGame = () => {
            setDeck(INITIAL_DECK);
            setCurrentCard(0);
            setScreen('intro');
            setImageError(false);
            setIsAnimating(false);
          };

          const CardContent = ({ cardNumber }) => {
            const isBack = cardNumber === 0;
            const fileName = `card${cardNumber}.png`;
            
            if (imageError && !isBack) {
              return (
                <div className="w-full h-full bg-[#F3E5F5] flex flex-col items-center justify-center p-4 text-center">
                  <i data-lucide="image-off" className="text-[#B39DDB] mb-2 w-20 h-20"></i>
                  <span className="text-9xl font-bold text-[#9575CD]">{cardNumber}</span>
                </div>
              );
            }

            return (
              <img 
                src={fileName} 
                alt={isBack ? "גב הקלף" : `קלף ${cardNumber}`} 
                className="card-img-fit" 
                onError={() => setImageError(true)} 
              />
            );
          };

          return (
            <div className="min-h-screen flex items-center justify-center p-2 font-sans text-slate-700 relative overflow-hidden" dir="rtl">
              <div className="animated-bg absolute inset-0 -z-10"></div>

              <div className="max-w-md w-full bg-white/95 backdrop-blur-xl rounded-[3.5rem] custom-shadow border border-white/60 overflow-hidden min-h-[700px] flex flex-col relative">
                
                {/* מסך פתיחה */}
                {screen === 'intro' && (
                  <div className="p-8 flex-1 flex flex-col items-center justify-center text-center animate-reveal">
                    <div className="relative mb-8">
                      <div className="w-40 h-40 rounded-full border-4 border-white shadow-xl overflow-hidden bg-white flex items-center justify-center">
                        {!dafnaImageError ? (
                            <img src="dafna.png" alt="דפנה" className="w-full h-full object-cover" onError={() => setDafnaImageError(true)} />
                        ) : (
                            <i data-lucide="user" className="text-[#B39DDB] w-20 h-20"></i>
                        )}
                      </div>
                      <div className="absolute -bottom-2 -right-2 bg-[#FFD1DC] rounded-full p-3 shadow-lg border-2 border-white text-[#D81B60]">
                        <i data-lucide="heart" className="w-6 h-6 fill-current"></i>
                      </div>
                    </div>

                    <h1 className="text-4xl font-black mb-4 bg-gradient-to-r from-[#4A148C] via-[#7B1FA2] to-[#D81B60] bg-clip-text text-transparent tracking-tight">מזל טוב דפנה!</h1>
                    
                    <div className="space-y-4 text-lg leading-relaxed text-slate-600 px-2 text-right">
                      <p className="font-bold text-[#7B1FA2] text-xl pr-4">דפנה יקרה,</p>
                      <p>לרגל יום הולדתך, בחרנו להעניק לך שי צנוע של הערכה:</p>
                      <div className="bg-[#F3E5F5]/60 p-5 rounded-[2rem] italic border border-[#D1C4E9] text-[#6A1B9A] text-center shadow-sm">כל מפקחת ומפקח שיתפו בתכונה ייחודית אחת המאפיינת אותך בעיניהם.</div>
                    </div>

                    <button 
                      onClick={() => setScreen('game')}
                      className="mt-10 w-full py-5 rounded-[2.5rem] font-bold text-xl bg-gradient-to-r from-[#FFD1DC] to-[#ffb7c5] text-[#880E4F] shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 border-b-4 border-[#F06292]"
                    >
                      <span>הצג דברי מפקחים</span>
                      <i data-lucide="sparkles" className="w-6 h-6"></i>
                    </button>
                  </div>
                )}

                {/* מסך המשחק - הגרלת קלפים */}
                {screen === 'game' && (
                  <div className="flex-1 flex flex-col animate-reveal">
                    <div className="pt-6 px-8 text-center">
                      <h2 className="text-2xl font-bold bg-gradient-to-r from-[#4A148C] to-[#D81B60] bg-clip-text text-transparent text-center text-pretty">מזל טוב לדפנה שלנו</h2>
                      <div className="inline-flex items-center gap-2 mt-2 px-5 py-1 bg-[#F3E5F5] rounded-full text-sm font-bold text-[#7B1FA2] border border-[#D1C4E9]/50 shadow-sm mx-auto">
                        <i data-lucide="layers" className="w-4 h-4"></i>
                        <span>נותרו {deck.length} קלפים</span>
                      </div>
                    </div>

                    {/* קלף מוגדל - תופס יותר מקום */}
                    <div className="px-3 py-4 flex-1 flex justify-center items-center overflow-hidden">
                      <div 
                        className={`w-full max-w-[380px] aspect-[3/4.4] bg-white rounded-[1.2rem] shadow-2xl border-4 border-white ring-1 ring-[#D1C4E9]/40 flex items-center justify-center transition-all duration-500 transform overflow-hidden
                          ${isAnimating ? 'opacity-0 -translate-y-16 scale-90 blur-sm' : 'opacity-100 translate-y-0 scale-100 blur-0'}
                        `}
                      >
                        <CardContent cardNumber={currentCard} />
                      </div>
                    </div>

                    <div className="px-8 pb-8 flex flex-col gap-4 items-center">
                      {deck.length > 0 ? (
                        <button
                          onClick={drawCard}
                          disabled={isAnimating}
                          className="w-full py-5 rounded-[2rem] font-bold text-xl bg-[#FFD1DC] text-[#880E4F] hover:bg-[#ffb7c5] shadow-xl active:scale-90 transition-all flex items-center justify-center gap-2 border-b-4 border-[#F06292]"
                        >
                          <i data-lucide="sparkles" className="w-5 h-5"></i>
                          <span>הגרילי קלף</span>
                        </button>
                      ) : (
                        <button
                          onClick={() => setScreen('end')}
                          className="w-full py-6 rounded-[2rem] font-black text-2xl bg-[#B3E5FC] text-[#01579B] hover:bg-[#81D4FA] shadow-2xl animate-pulse flex items-center justify-center gap-3 border-b-4 border-[#4FC3F7] ring-4 ring-[#B3E5FC]/50"
                        >
                          <span>למעבר לברכה המלאה</span>
                          <i data-lucide="heart" className="w-6 h-6 fill-current"></i>
                        </button>
                      )}
                      
                      <div className="mt-1 text-[11px] font-bold text-[#9575CD]/60 tracking-widest uppercase text-center">אפריל 2026</div>
                      <button onClick={resetGame} className="w-full py-1 font-bold text-slate-400 text-xs flex items-center justify-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
                        <i data-lucide="refresh-cw" className="w-3 h-3"></i>
                        התחל מהתחלה
                      </button>
                    </div>
                  </div>
                )}

                {/* מסך ברכה סופי */}
                {screen === 'end' && (
                  <div className="p-6 flex-1 flex flex-col items-center justify-center animate-reveal text-center relative overflow-hidden">
                    <div className="absolute top-10 left-10 text-[#FFD1DC] opacity-30 animate-pulse">
                      <i data-lucide="heart" className="w-16 h-16 fill-current"></i>
                    </div>
                    
                    <div className="mb-6 flex justify-center items-center gap-4">
                      <div className="w-14 h-14 bg-gradient-to-br from-[#B3E5FC] to-[#81D4FA] rounded-2xl rotate-12 flex items-center justify-center shadow-lg animate-reveal delay-1">
                        <i data-lucide="quote" className="text-white -rotate-12 w-8 h-8"></i>
                      </div>
                      <div className="relative w-28 h-38 bg-white rounded-2xl shadow-2xl border-[6px] border-white overflow-hidden flex items-center justify-center transform -rotate-12 -translate-x-4 hover:rotate-0 transition-transform duration-700 animate-reveal delay-3 ring-1 ring-purple-100">
                        {!card0Error ? (
                          <img src="card0.png" alt="דפנה עם עוגה" className="w-full h-full object-cover" onError={() => setCard0Error(true)} />
                        ) : (
                          <div className="w-full h-full bg-gradient-to-br from-[#F3E5F5] to-[#E1BEE7] flex flex-col items-center justify-center p-2 text-center">
                            <i data-lucide="cake" className="text-[#9575CD] mb-1 w-10 h-10"></i>
                            <span className="text-[10px] font-black text-[#7B1FA2] leading-tight">מזל טוב דפנה!</span>
                          </div>
                        )}
                      </div>
                    </div>
                    
                    <div className="bg-white/50 p-6 rounded-[3rem] border border-white/80 shadow-inner space-y-5 relative overflow-hidden">
                      <h3 className="text-3xl font-black mb-6 animate-reveal delay-2 relative inline-block bg-gradient-to-r from-[#4A148C] to-[#D81B60] bg-clip-text text-transparent">
                        דפנה יקרה,
                        <div className="absolute -bottom-1.5 left-0 right-0 h-1 bg-[#FFD1DC] rounded-full" />
                      </h3>

                      <div className="space-y-3 text-slate-800 text-base md:text-lg leading-relaxed font-medium">
                        <p className="animate-reveal delay-3 text-[#4A148C]">אנו מאחלים לך בריאות איתנה, שמחה ושקט בלב,</p>
                        <p className="animate-reveal delay-4 text-[#7B1FA2]">שתמשיכי להיות מוקפת באהבת משפחתך,</p>
                        <p className="animate-reveal delay-5 text-[#880E4F]">ולהרחיב עוד ועוד מעגלי השפעה של טוב, השראה ואנרגיות מעצימות.</p>
                        <p className="font-bold text-lg pt-1 animate-reveal delay-6 bg-gradient-to-r from-[#7B1FA2] to-[#D81B60] bg-clip-text text-transparent text-center text-pretty">
                          שתמשיכי לגעת, להוביל, וליצור עולם טוב יותר – בדרכך הייחודית והמרגשת.
                        </p>
                      </div>
                      
                      <div className="pt-8 animate-reveal" style={{animationDelay: '1.8s'}}>
                        <div className="inline-block px-10 py-5 bg-gradient-to-r from-[#F3E5F5] to-[#E1BEE7] rounded-full shadow-lg border border-white transition-transform hover:scale-105 duration-300">
                          <p className="text-base font-bold text-[#D81B60] mb-0.5 text-center">באהבה גדולה,</p>
                          <p className="text-2xl md:text-3xl font-black bg-gradient-to-r from-[#4A148C] to-[#7B1FA2] bg-clip-text text-transparent tracking-tight text-center">
                            מפקחי היסודי
                          </p>
                        </div>
                      </div>
                    </div>

                    <div className="mt-8 text-[11px] font-bold text-[#9575CD]/60 tracking-widest uppercase text-center">אפריל 2026</div>
                    <button onClick={resetGame} className="mt-6 text-[#9575CD] hover:text-[#6A1B9A] font-black uppercase tracking-tighter transition-all flex items-center justify-center gap-2 text-xs">
                      <i data-lucide="refresh-cw" className="w-3 h-3"></i>
                      חזרה להתחלה
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
